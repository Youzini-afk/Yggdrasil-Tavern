schema_version: 1
id: ydltavern/engine
version: 0.0.1
display_name: "YdlTavern Engine"
description: "SillyTavern-compatible generation engine for YdlTavern. Skeleton phase: stub responses only, no real model calls."
entry:
  kind: subprocess
  command:
    - node
    - --experimental-vm-modules
    - dist/index.js
  transport: json_rpc_stdio
provides:
  - id: ydltavern/engine/describe
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns engine version, supported connectors, and supported features as deterministic stubs.
  - id: ydltavern/engine/preset.compile
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a compiled prompt manager plan stub for a preset id.
  - id: ydltavern/engine/world_info.evaluate
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a world info evaluation plan stub with no activated entries.
  - id: ydltavern/engine/turn.generate
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: true
    description: Returns a stubbed assistant turn variant snapshot for a Turn-shaped input.
  - id: ydltavern/engine/turn.swipe
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a deterministic new variant index stub for a turn id.
  - id: ydltavern/engine/turn.regenerate
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a deterministic replacement variant index stub for a turn id.
  - id: ydltavern/engine/turn.continue
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a deterministic appended text stub for the last variant.
  - id: ydltavern/engine/asset.import_character_v2
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a stub character record for a base64 PNG card without parsing it.
  - id: ydltavern/engine/asset.import_world_book
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a stub world book record for JSON input without persisting it.
  - id: ydltavern/engine/script.eval
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns an echo stub for an STScript string without executing it.
  - id: ydltavern/engine/diagnostics
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns deterministic engine diagnostics and in-memory invocation counters.
  # Deep-port capabilities (N1-N12)
  - id: ydltavern/engine/prompt.manager.compile
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Compiles ST PromptManager prompts into a ChatCompletion chat array via preparePromptsForChatCompletion.
  - id: ydltavern/engine/world_info.route
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Routes activated WI entries into position buckets via routeActivatedEntries.
  - id: ydltavern/engine/world_info.match_keys
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Tests keyword match and selective logic via matchKeys + selectiveLogicMatches.
  - id: ydltavern/engine/provider.chat.build_request
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Builds a chat completion request body per provider via buildChatRequest.
  - id: ydltavern/engine/provider.text.build_request
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Builds a text completion request body per provider via buildTextRequest.
  - id: ydltavern/engine/provider.text.plan_horde
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Plans a Kobold Horde job with enforced min length via planHordeJob.
  - id: ydltavern/engine/instruct.format_chat
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Formats a single chat message with instruct-mode sequences via formatInstructModeChat.
  - id: ydltavern/engine/instruct.stopping_sequences
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Computes stopping sequences from an instruct template via getInstructStoppingSequences.
  - id: ydltavern/engine/tokenizer.best_match
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Selects the best tokenizer ID for a given API and model via getTokenizerBestMatch.
  - id: ydltavern/engine/tokenizer.guesstimate
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Returns a byte-length-based token guesstimate via guesstimate.
  - id: ydltavern/engine/script.macro.expand
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Expands ST macros in text via substituteSTMacrosDeep with full macro registry.
  - id: ydltavern/engine/extension.regex.apply_st
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Applies ST-native regex scripts via getRegexedString (deep-port RegexScriptST format).
  - id: ydltavern/engine/extension.loader.parse_manifest
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Parses and validates an ST extension manifest via parseSTManifest.
  - id: ydltavern/engine/extension.loader.plan_activate_all
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Plans activation order and load steps for all extensions via planActivateAll.
  - id: ydltavern/engine/extension.caption.plan
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Plans a caption request for an image via planCaption.
  - id: ydltavern/engine/extension.tts.plan_narration
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Plans TTS narration segments for a message via planTtsNarration.
  - id: ydltavern/engine/extension.translate.plan
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Plans a translation request via planTranslate.
  - id: ydltavern/engine/extension.connection_profile.snapshot
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Snapshots current connection settings into a profile via snapshotConnectionProfile.
  - id: ydltavern/engine/extension.connection_profile.apply_plan
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Produces apply commands from a connection profile via applyConnectionProfilePlan.
  - id: ydltavern/engine/extension.sd.process_triggers
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Detects SD generation triggers in text via processSdTriggers.
  - id: ydltavern/engine/model.live_call
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: false
    description: Real provider chat completion via Yggdrasil public outbound (unary).
  - id: ydltavern/engine/model.live_call.stream
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: true
    description: Real provider chat completion via Yggdrasil public outbound (streaming SSE).
  - id: ydltavern/engine/model.live_realtime
    version: 0.0.1
    input_schema: {}
    output_schema: {}
    streaming: true
    description: Real provider realtime via Yggdrasil public outbound websocket (OpenAI Realtime, Gemini Live).
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces: []
permissions:
  network:
    declarations:
      - host: api.openai.com
        methods: [POST, WEBSOCKET]
      - host: api.deepseek.com
        methods: [POST]
      - host: api.anthropic.com
        methods: [POST]
      - host: openrouter.ai
        methods: [POST]
      - host: generativelanguage.googleapis.com
        methods: [POST, WEBSOCKET]
    hosts: []
  secret_refs:
    - secret_ref:store:OPENAI_API_KEY
    - secret_ref:store:DEEPSEEK_API_KEY
    - secret_ref:store:ANTHROPIC_API_KEY
    - secret_ref:store:OPENROUTER_API_KEY
    - secret_ref:store:GEMINI_API_KEY
    - secret_ref:env:OPENAI_API_KEY
    - secret_ref:env:DEEPSEEK_API_KEY
    - secret_ref:env:ANTHROPIC_API_KEY
    - secret_ref:env:OPENROUTER_API_KEY
    - secret_ref:env:GEMINI_API_KEY
sandbox_policy:
  cpu_quota_ms_per_invoke: 10000
  memory_mb: 256
  wall_clock_ms: 60000
