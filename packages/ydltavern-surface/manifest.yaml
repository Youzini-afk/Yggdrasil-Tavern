# Yggdrasil PackageManifest shape verified against ygg-core/src/manifest.rs lines 7-29 (PackageManifest), 32-53 (PackageEntry), 91-122 (surface contributions), and 162-171 (SurfaceSlot). Current PackageEntry has no web_surface_bundle variant, so this surface-only React bundle uses the accepted wasm entry kind as a non-executed bundle sentinel; React loading details remain in metadata and surface.manifest.json.
schema_version: 1
id: ydltavern/surface
version: 0.1.0
description: "YdlTavern Tavern-style surface bundle (React)"

entry:
